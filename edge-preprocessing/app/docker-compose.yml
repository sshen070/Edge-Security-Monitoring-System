version: "3.8"

services:

  mosquitto:
    image: eclipse-mosquitto
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
    restart: unless-stopped

  sensor_processor:
    build: ./esp32-c6-sensors
    container_name: sensor_processor
    depends_on:
      - mosquitto
    restart: unless-stopped
    volumes:
      - ./esp32-c6-sensors/logs:/app/logs
    environment:
      # Set GATEWAY_URL to point at the Jetson gateway (override this on the host or with an .env file).
      # Default uses host.docker.internal (Docker Desktop). On Jetson use the Jetson IP e.g. http://10.42.0.1:8080
      - GATEWAY_URL=${GATEWAY_URL:-http://host.docker.internal:8080}
      - GATEWAY_API_KEY=${GATEWAY_API_KEY:-}
      