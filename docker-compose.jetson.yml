services:
  device-gateway:
    build: ./jetson-device-gateway
    container_name: jetson-device-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DEVICE_REGISTRY_DB: /app/data/devices.db
      CAMERA_REQUEST_TIMEOUT: "10"
    volumes:
      - ./jetson-device-gateway/data:/app/data
